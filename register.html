<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 페이지</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 200px; }
        button { width: 100%; padding: 10px; background: #2196F3; color: white; border: none; cursor: pointer; }
        .back-link { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <h2>회원가입</h2>
    <form>
        <input type="text" placeholder="아이디">
        <input type="email" placeholder="이메일">
        <input type="password" placeholder="비밀번호">
        <button type="submit">가입 완료</button>
    </form>
    <a href="index.html" class="back-link">뒤로 가기</a>
</body>
</html>
